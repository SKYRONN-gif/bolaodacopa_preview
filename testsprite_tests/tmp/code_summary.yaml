version: "2"
type: frontend
tech_stack:
  - language: TypeScript
  - framework: React 19
  - build_tool: Vite 6
  - ui_library: Tailwind CSS
  - backend: Firebase Auth + Firestore
routes:
  - path: /
    file: src/App.tsx
    auth_required: false
    description: Main bolão experience with home, matches, leaderboard, and admin tabs
features:
  - name: Public landing and rules
    description: View the home screen, prize summary, and bolão rules without authentication.
    files:
      - src/features/home/HomePage.tsx
    entry_route: /
    user_interactions:
      - Open the app
      - Read prize summary and bolão rules
      - Navigate to matches or ranking
    api_calls: []
    auth_required: false
  - name: Public matches browsing
    description: View match cards, lock status, and basic match details.
    files:
      - src/features/matches/MatchCard.tsx
      - src/components/MatchesList.tsx
    entry_route: /
    user_interactions:
      - Open the matches tab
      - Review match cards
      - See prediction lock status and details
    api_calls:
      - method: GET
        endpoint: Firestore /matches
    auth_required: false
  - name: Public ranking
    description: View leaderboard and audit content when data is available.
    files:
      - src/components/Leaderboard.tsx
      - src/features/leaderboard/RankingTable.tsx
    entry_route: /
    user_interactions:
      - Open the ranking tab
      - Review leaderboard and audit rows
      - Scroll on mobile and desktop
    api_calls:
      - method: GET
        endpoint: Firestore /players and /matches
    auth_required: false
  - name: Google login entry
    description: User can initiate Google sign-in from the header.
    files:
      - src/App.tsx
      - src/firebase.ts
    entry_route: /
    user_interactions:
      - Click the Google login button
      - Start authentication flow
    api_calls:
      - method: GET/POST
        endpoint: Firebase Authentication
    auth_required: false
known_limitations:
  - issue: The app requires Firebase environment variables and a configured project to load correctly.
    location: src/firebase.ts
    impact: Public pages may fail to render or fall back to local/offline mode without valid config.
  - issue: Admin-only features rely on Firebase rules and email authorization.
    location: firestore.rules
    impact: Admin UI is not the focus of this first public-only test cycle.
